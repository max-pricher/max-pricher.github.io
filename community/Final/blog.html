<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
    <link rel="stylesheet" href="https://use.typekit.net/xyr8pzr.css">
    <link rel="stylesheet" href="https://use.typekit.net/xyr8pzr.css">
    <link rel="stylesheet" href="https://use.typekit.net/xyr8pzr.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
   <header class="global-header">
        <div class = "header-container">
            <a href="community.html" class="nav-brand">Colorado Queer Sexual Health Hub</a>

            <nav class="nav-bar-container">
                <ul class="nav-bar" aria-label="Website Navigation Menu">
                    <li><a href="community.html">Home</a></li>
                    <li><a href="community.html#Events">Events</a></li>
                    <li><a href="community.html#Contact">Contact</a></li>
                    <li><a href="blog.html">Blog</a></li>
                </ul>
            </nav>

            <button class="nav-toggle" aria-label="Toggle navigation menu">
                    <span></span>
                    <span></span>
                    <span></span>
            </button>
        </div>
    </header>

    <main>
        <h1 class="blog-header header">Community Voices</h1>

         <!-- filters for the blogs-->
        <nav class="blog-nav" aria-label="Blog Content Filters">
            <h2 class="filter-label header">Filter by Identity:</h2>
            <button data-filter="All" class="blog-button">All</button>
            <button data-filter="Male" class="blog-button">Male</button>
            <button data-filter="Female" class="blog-button">Female</button>
            <button data-filter="Non-Binary" class="blog-button">Non-Binary</button>
        </nav>

        

        <div class="blog-entry-container">
    <div class="entry-row">
        <input class="entry-field subtext" id="name-entry" type="text" placeholder="Name or Alias">
        
        <select class="entry-field subtext" id="category-entry">
            <option value="disabled selected">Select Identity...</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Non-Binary">Non-Binary</option>
            <option value="All">Other</option>
        </select>
    </div>

    <textarea class="entry-field subtext" id="blog-entry" rows="3" placeholder="Share your story..."></textarea>
    
    <button id="js-blog-button" class="blog-button">Submit Story</button>
</div>

        <!-- All blogs within this div-->
        <div class="blog-grid" id ="js-blog-grid">

        </div>
    </main>
    <footer>
    <p>&copy; 2025 Max Pricher's Project</p>

        <div class="footer-button-container">
            
            <div class="privacy-toggle-wrapper">
                <input type="checkbox" id="js-privacy-checkbox" class="browser-check-box">
                <label for="js-privacy-checkbox" id="js-save-preferences">Save my preferences</label>
            </div>

            <button class="footer-button" id="theme-toggle">Change Theme</button>
            <button class="footer-button" id="clear-data">Clear Data</button>
            <a class="footer-button" id="back-to-top" href="#top">Back to Top</a>
        </div>
    </footer>
    <script src="demo-blog-entries.js"></script>
    <script src="script.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
    <link rel="stylesheet" href="https://use.typekit.net/xyr8pzr.css">
    <link rel="stylesheet" href="https://use.typekit.net/xyr8pzr.css">
    <link rel="stylesheet" href="https://use.typekit.net/xyr8pzr.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
   <header class="global-header">
        <div class = "header-container">
            <a href="community.html" class="nav-brand">Colorado Queer Sexual Health Hub</a>

            <nav class="nav-bar-container">
                <ul class="nav-bar" aria-label="Website Navigation Menu">
                    <li><a href="community.html">Home</a></li>

                    <!-- found this from a medium article by Bogdan Bendziukov -->
                    <li><button class="nav-button" id="Nav-Button" aria-haspopup="true"
                            aria-expanded="false">Resources</button>
                        <ul class="submenu">
                            <li><a href="community.html#Identity">Identity</a></li>
                            <li><a href="community.html#Crisis">Crisis</a></li>
                            <li><a href="community.html#SexEd">Sex Ed</a></li>
                        </ul>
                    </li>
                    <li><a href="community.html#Events">Events</a></li>
                    <li><a href="community.html#Contact">Contact</a></li>
                    <li><a href="blog.html">Blog</a></li>
                </ul>
            </nav>

            <button class="nav-toggle" aria-label="Toggle navigation menu">
                    <span></span>
                    <span></span>
                    <span></span>
            </button>
        </div>
    </header>

    <main>
        <h1 class="blog-header">Community Voices</h1>

         <!-- filters for the blogs-->
        <nav class="blog-nav" aria-label="Blog Content Filters">
            <h2 class="filter-label">Filter by Identity:</h2>
            <button data-filter="All" class="blog-button">All</button>
            <button data-filter="Male" class="blog-button">Male</button>
            <button data-filter="Female" class="blog-button">Female</button>
            <button data-filter="Non-Binary" class="blog-button">Non-Binary</button>
        </nav>

        

        <div class="blog-entry-container">
    <div class="entry-row">
        <input class="entry-field" id="name-entry" type="text" placeholder="Name or Alias">
        
        <select class="entry-field" id="category-entry">
            <option value="disabled selected">Select Identity...</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Non-Binary">Non-Binary</option>
            <option value="All">Other</option>
        </select>
    </div>

    <textarea class="entry-field" id="blog-entry" rows="3" placeholder="Share your story..."></textarea>
    
    <button id="js-blog-button" class="blog-button">Submit Story</button>
</div>

        <!-- All blogs within this div-->
        <div class="blog-grid" id ="js-blog-grid">

        </div>
    </main>
    <footer>
        <p>&copy; 2025 Max Pricher's Project</p>

        <div class = "footer-button-container">
            <a class="footer-button" id="back-to-top" aria-label="Back to top" href="#top">Back to Top</a>
            <button class ="footer-button" id="theme-toggle" aria-label="Toggle dark and light themes">Change Theme</button>
            <button class="footer-button" id="clear-data" aria-label="Remove my data">Remove my data</button>
            <button class="footer-button" id="dont-store-data" aria-label="Don't store my data">Don't store my data</button>
            <button class="footer-button" id="start-storing-data" aria-label="Start saving my data">Start Saving Data</button>
        </div>
    </footer>
    <script src="demo-blog-entries.js"></script>
    <script src="script.js"></script>

</body>

</html>
